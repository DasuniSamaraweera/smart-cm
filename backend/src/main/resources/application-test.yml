spring:
  datasource:
    # Defaults to H2 for local tests, but allows CI to override to Postgres via env vars
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:smartcm;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false